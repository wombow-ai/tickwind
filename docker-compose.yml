# Full stack for a small VM (fits comfortably in ~1 GB RAM).
# Nothing is published on the host — Cloudflare Tunnel (cloudflared) is the ONLY
# inbound path, mapping api.tickwind.com -> the api container. No open ports,
# no public IP, free TLS. The frontend is hosted separately on Cloudflare Pages.
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      STORE_BACKEND: postgres
      # Per-user data (watchlist, clips) → the local Postgres below.
      USER_DATABASE_URL: postgres://tickwind:${POSTGRES_PASSWORD:-tickwind}@postgres:5432/tickwind?sslmode=disable
      # Collected/scraped corpus (securities, filings, quotes, news, social) →
      # a durable, backed-up DB (set MARKET_DATABASE_URL in .env, e.g. Supabase).
      # When MARKET_DATABASE_URL is empty the app falls back to DATABASE_URL
      # (the local Postgres) for everything.
      MARKET_DATABASE_URL: ${MARKET_DATABASE_URL:-}
      DATABASE_URL: postgres://tickwind:${POSTGRES_PASSWORD:-tickwind}@postgres:5432/tickwind?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    # No host ports: reachable only inside the compose network, via cloudflared.

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tickwind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tickwind}
      POSTGRES_DB: tickwind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickwind -d tickwind"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
