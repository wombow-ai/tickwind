# Full stack on the Oracle Always-Free VM.
# Nothing is published on the host — Cloudflare Tunnel (cloudflared) is the ONLY
# inbound path, mapping api.tickwind.com -> the api container. No open ports,
# no public IP, free TLS. The frontend is hosted separately on Cloudflare Pages.
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      STORE_BACKEND: postgres
      DATABASE_URL: postgres://tickwind:${POSTGRES_PASSWORD:-tickwind}@postgres:5432/tickwind?sslmode=disable
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    # No host ports: reachable only inside the compose network, via cloudflared.

  postgres:
    image: timescale/timescaledb-ha:pg17   # bundles timescaledb + pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: tickwind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tickwind}
      POSTGRES_DB: tickwind
    volumes:
      - pgdata:/home/postgres/pgdata/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:
