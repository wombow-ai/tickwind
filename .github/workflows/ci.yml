name: CI

# Mirrors the local verify gate (CLAUDE.md): Go build/vet/gofmt/test + web build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go · build · vet · gofmt · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: gofmt (must be empty)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      # Scoped to real packages — `./...` would descend into web/node_modules
      # (a stray vendored Go file); see CLAUDE.md.
      - name: Test
        run: go test ./cmd/... ./internal/...

  web:
    name: Web · lint · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Placeholders so client init never throws at build (real values live in
          # Vercel). No network calls happen during build.
          NEXT_PUBLIC_API_BASE: "https://api.tickwind.com"
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"

  security:
    name: Security · govulncheck · gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Call-graph-aware vuln scan — fails CI only on a vuln we actually reach.
      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          repo-checkout: false
      # Static security analysis — informational only (never blocks CI).
      - name: gosec
        uses: securego/gosec@master
        with:
          args: -no-fail ./...
        continue-on-error: true
